<!DOCTYPE html>
    <html>
        <head>
            <title>Mapa</title>
            <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
            <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
        	

        </head>
        <body>
            <div id="map" style="height: 500px;"></div>
            <script> 
                var map = L.map('map').setView([-34.6037, -58.3816], 13);

                var greenIcon = L.icon({
                iconUrl: 'momo.png',

                iconSize:     [38, 95], // size of the icon
                shadowSize:   [50, 64], // size of the shadow
                iconAnchor:   [22, 94], // point of the icon which will correspond to marker's location
                shadowAnchor: [4, 62],  // the same for the shadow
                popupAnchor:  [-3, -76] // point from which the popup should open relative to the iconAnchor
                });
                
                var Original = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                attribution: '&copy; OpenStreetMap contributors'
                }).addTo(map);
                
                var Capa_2 = L.tileLayer('https://{s}.tile.openstreetmap.fr/hot/{z}/{x}/{y}.png', {
                maxZoom: 19,
                attribution: '© OpenStreetMap contributors, Tiles style by Humanitarian OpenStreetMap Team hosted by OpenStreetMap France'});
                    
                var geojsonFeature = [{
                    "type": "LineString",
                    "coordinates": [[-100, 40], [-105, 45], [-110, 55]]
                }, {
                    "type": "LineString",
                    "coordinates": [[-105, 40], [-110, 45], [-115, 55]]
                }];

            </script>
        
            <script>
                var baseMaps = {
                    "mapa original": Original,
                    "la segunda capa": Capa_2
                };
            </script>


            <script>
                var layerControl = L.control.layers(baseMaps).addTo(map);
                L.marker([51.5, -0.09], {icon: greenIcon}).addTo(map);
                L.geoJSON(geojsonFeature).addTo(map);
            </script>
            <script>
    	        var marker = L.marker([-34.6037, -58.3816]).addTo(map);
            </script>
            <script>
                var marker = L.marker([-34.6037, -58.3816]).addTo(map);
                marker.bindPopup("Hola! Soy un popup 😄");
            </script>
            <script>
    	        var marker = L.marker([-37.6037, -59.3816]).addTo(map);
            </script>
            <script>
                var marker = L.marker([-37.6037, -59.3816]).addTo(map);
                marker.bindPopup("casi tandil");
            </script>
            <script>
    	        var marker = L.marker([32.037, 35.3816]).addTo(map);
            </script>
            <script>
                var marker = L.marker([32.037, 35.3816]).addTo(map);
                marker.bindPopup("Israel (creo)");
            </script>
            <script>
    	        var marker = L.marker([-20.5478, -28.4018]).addTo(map);
            </script>
            <script>
                var marker = L.marker([-20.5478, -28.4018]).addTo(map);
                marker.bindPopup("isla");
            </script>
            <script>
                var popup = L.popup();

                function onMapClick(e) {
                    popup
                        .setLatLng(e.latlng)
                        .setContent("You clicked the map at " + e.latlng.toString())
                        .openOn(map);
                }

                map.on('click', onMapClick);
            </script>
            <script>
                var polygon = L.polygon([
                [51.509, -0.08],
                [51.503, -0.06],
                [51.51, -0.047]
                ]).addTo(map);
                polygon.bindPopup("Wapping").openPopup();
            </script>
            
            
           
        </body>
    </html>
